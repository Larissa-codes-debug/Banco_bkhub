<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookingHub - Cadastro do Passageiro</title>

    <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: lab(51.3% 22.02 -68.68);
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            color: white;
            text-align: center;
        }

        fieldset{
            width: 500px;
            padding: 60px;
            border-radius: 10px;
            background-color: white;
            border: none;
        }

        h2{
            text-align: center;
            margin-bottom: 30px;
            color: #1e293b;
        }

        label, input, select{
            display: block;
            width: 100%;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        input, select{
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #999;
        }

        input[type="submit"]{
            background-color: rgb(37, 37, 233);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        input[type="submit"]:hover{
            background-color: hwb(182 5% 21%);
        }

        p{
            color: white;
        }
    </style>
</head>

<body>

    <h1>BookingHub</h1>

    <form action="#" method="post">
        <fieldset>

            <h2>Cadastro do Passageiro</h2>

            <label for="nome">Nome completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="Digite seu CPF" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="Digite seu telefone" required>

            <label for="nascimento">Data de nascimento</label>
            <input type="date" id="nascimento" required>

            <label for="destino">Destino desejado</label>
            <input type="text" id="destino" placeholder="Ex: Fortaleza, Quixadá, Juazeiro">

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Crie uma senha" required>

            <input type="submit" value="Cadastrar Passageiro">

        </fieldset>
    </form>

    <p>BookingHub: Plataforma de Reservas © LARISSA E INGRID 2026</p>

</body>
</html>
